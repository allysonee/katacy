<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katacy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --midnight: #1C1030;
      --blush: #E0A0B8;
      --blush-soft: #F0DDE6;
      --blush-faint: #FDF5F8;
      --muted: #B87A94;
      --text: #1C1030;
    }

    html, body {
      height: 100%;
      background: var(--blush-faint);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--midnight);
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 0 0 2rem 0;
    }

    .sidebar-brand {
      padding: 1.75rem 1.5rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 1.5rem;
    }

    .sidebar-brand h1 {
      font-family: 'Urbanist', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .sidebar-brand .tagline {
      font-size: 0.7rem;
      color: var(--blush);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.35rem;
      font-weight: 400;
    }

    .sidebar-section {
      padding: 0 1.5rem;
      margin-bottom: 1.5rem;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blush);
      margin-bottom: 0.75rem;
    }

    /* checkboxes */
    .check-list {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
    }

    .check-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      border: 1.5px solid var(--blush);
      border-radius: 4px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }

    .check-item input[type="checkbox"]:checked {
      background: var(--blush);
      border-color: var(--blush);
    }

    .check-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 1px; left: 4px;
      width: 4px; height: 8px;
      border: 1.5px solid var(--midnight);
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .check-item span {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      font-weight: 300;
      line-height: 1;
      user-select: none;
    }

    /* divider */
    .sidebar-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 0.5rem 1.5rem 1.5rem;
    }

    /* toggles */
    .toggle-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .toggle-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      font-weight: 300;
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0; height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-track::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-track {
      background: var(--blush);
    }

    .toggle-switch input:checked + .toggle-track::before {
      transform: translateX(16px);
    }

    /* timer slider */
    #timer-slider-wrap {
      margin-top: -0.5rem;
      margin-bottom: 1rem;
      display: none;
    }

    #timer-slider-wrap.visible {
      display: block;
    }

    .slider-value {
      font-size: 0.75rem;
      color: var(--blush);
      margin-bottom: 0.35rem;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--blush);
      border-radius: 50%;
      cursor: pointer;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 3rem 3.5rem;
      display: flex;
      flex-direction: column;
    }

    /* generate button */
    .btn-generate {
      font-family: 'Urbanist', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--blush-faint);
      background: var(--midnight);
      border: none;
      border-radius: 14px;
      padding: 0.85rem 2.5rem;
      cursor: pointer;
      position: fixed;
      left: calc(260px + (100vw - 260px) / 2);
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      box-shadow: 0 2px 18px rgba(28,16,48,0.18);
      transition: background 0.2s, color 0.2s;
    }

    .btn-generate:hover {
      background: var(--blush);
      color: var(--midnight);
    }

    .btn-generate:active {
      transform: translate(-50%, -50%) scale(0.98);
    }

    /* question card */
    .question-card {
      background: #fff;
      border: 1px solid var(--blush-soft);
      border-radius: 22px;
      padding: 2.5rem 3rem;
      margin: 2rem auto 6rem;
      width: fit-content;
      min-width: 280px;
      max-width: 820px;
      min-height: 120px;
      display: none;
    }

    .question-card.visible {
      display: block;
    }

    .question-text {
      font-family: 'Outfit', sans-serif;
      font-size: 1.7rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--midnight);
      text-align: center;
    }

    .question-placeholder {
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      font-style: italic;
    }

    /* timer */
    .timer-block {
      display: none;
      text-align: center;
      margin: 6rem 0;
    }

    .timer-block.visible {
      display: block;
    }

    .timer-display {
      font-family: 'Urbanist', sans-serif;
      font-size: 10rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--midnight);
      line-height: 1;
      transition: color 0.4s;
    }

    .timer-sublabel {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* audio icons */
    .card-audio-icons {
      display: none;
      gap: 10px;
      margin-top: 1.25rem;
      padding-top: 1rem;
      justify-content: center;
    }

    .card-audio-icons.visible {
      display: flex;
    }

    .audio-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      transition: color 0.15s;
      line-height: 1;
    }

    .audio-icon-btn:hover { color: var(--midnight); }
    .audio-icon-btn svg { display: block; }

    /* hidden message */
    .hidden-msg {
      display: none;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
      margin: 2rem 0;
    }

    .hidden-msg.visible {
      display: block;
    }

    /* error */
    .error-msg {
      color: #c45c80;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    /* loading */
    .btn-generate.loading {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* responsive */
    @media (max-width: 700px) {
      .sidebar { width: 220px; min-width: 220px; }
      .main { padding: 2rem 1.5rem; }
      .question-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>✦ Katacy</h1>
      <div class="tagline">Pageant Q&A Practice</div>
    </div>

    <div class="sidebar-section">
      <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;">
        Topics
        <button onclick="toggleAllTopics(this)" style="background:none;border:none;color:var(--blush);font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;padding:0;">Select all</button>
      </div>
      <div class="check-list" id="topics-list">
        {% for topic in topics %}
        <label class="check-item">
          <input type="checkbox" name="topic" value="{{ topic }}"
            {% if topic == "General Personality" %}checked{% endif %} />
          <span>{{ topic }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Difficulty</div>
      <div class="check-list">
        <label class="check-item">
          <input type="checkbox" name="difficulty" value="Easy" checked />
          <span>Easy</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="difficulty" value="Medium" checked />
          <span>Medium</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="difficulty" value="Hard" checked />
          <span>Hard</span>
        </label>
      </div>
    </div>

    <hr class="sidebar-divider" />

    <div class="sidebar-section">
      <!-- Timer toggle -->
      <div class="toggle-item">
        <span class="toggle-label">Timer</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-timer" />
          <span class="toggle-track"></span>
        </label>
      </div>

      <!-- Timer slider -->
      <div id="timer-slider-wrap">
        <div class="slider-value"><span id="slider-label">30</span>s</div>
        <input type="range" id="timer-slider" min="15" max="120" step="5" value="30" />
      </div>

      <!-- Read aloud toggle -->
      <div class="toggle-item">
        <span class="toggle-label">Read aloud</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-read" />
          <span class="toggle-track"></span>
        </label>
      </div>

      <!-- Show question toggle -->
      <div class="toggle-item">
        <span class="toggle-label">Show question</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-show" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <!-- Question card -->
    <div class="question-card" id="question-card">
      <p class="question-text" id="question-text"></p>
      <div class="card-audio-icons" id="card-audio-icons">
        <!-- Mute/unmute -->
        <button class="audio-icon-btn" id="btn-mute" title="Mute" onclick="toggleMute()">
          <svg id="icon-sound" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
          <svg id="icon-muted" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
        <!-- Replay -->
        <button class="audio-icon-btn" id="btn-replay" title="Replay" onclick="replayAudio()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <div class="hidden-msg" id="hidden-msg">Question generated — enable <em>Show question</em> or <em>Read aloud</em> to reveal it.</div>

    <audio id="audio-el"></audio>

    <!-- Timer -->
    <div class="timer-block" id="timer-block">
      <div class="timer-display" id="timer-display">1:00</div>
      <div class="timer-sublabel">Time remaining</div>
    </div>
  </main>

</div>

<!-- Fixed generate button, outside any overflow parent -->
<button class="btn-generate" id="btn-generate" onclick="generateQuestion()">
  Generate Question
</button>

<script>
  // ── Select all topics ──────────────────────────────────────────────────────
  function toggleAllTopics(btn) {
    const boxes = document.querySelectorAll('input[name="topic"]');
    const allChecked = [...boxes].every(b => b.checked);
    boxes.forEach(b => b.checked = !allChecked);
    btn.textContent = allChecked ? 'Select all' : 'Deselect all';
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let lastQuestion = '';
  let timerInterval = null;
  const audioEl = document.getElementById('audio-el');

  // ── Toggle: timer slider ───────────────────────────────────────────────────
  const toggleTimer = document.getElementById('toggle-timer');
  const sliderWrap  = document.getElementById('timer-slider-wrap');
  const timerSlider = document.getElementById('timer-slider');
  const sliderLabel = document.getElementById('slider-label');

  toggleTimer.addEventListener('change', () => {
    sliderWrap.classList.toggle('visible', toggleTimer.checked);
  });

  timerSlider.addEventListener('input', () => {
    sliderLabel.textContent = timerSlider.value;
  });

  // ── Toggle: show question card ─────────────────────────────────────────────
  const toggleShow = document.getElementById('toggle-show');
  const questionCard = document.getElementById('question-card');

  toggleShow.addEventListener('change', () => {
    if (lastQuestion) {
      questionCard.classList.toggle('visible', toggleShow.checked);
    }
    updateHiddenMsg();
  });

  const toggleRead = document.getElementById('toggle-read');
  const cardAudioIcons = document.getElementById('card-audio-icons');
  const hiddenMsg = document.getElementById('hidden-msg');
  let currentBlobUrl = null;

  function updateHiddenMsg() {
    if (lastQuestion && !toggleShow.checked && !toggleRead.checked) {
      hiddenMsg.classList.add('visible');
    } else {
      hiddenMsg.classList.remove('visible');
    }
  }

  toggleShow.addEventListener('change', updateHiddenMsg);
  toggleRead.addEventListener('change', updateHiddenMsg);

  // ── Helpers ────────────────────────────────────────────────────────────────
  function getSelectedTopics() {
    return [...document.querySelectorAll('input[name="topic"]:checked')]
      .map(el => el.value);
  }

  function getSelectedDifficulties() {
    return [...document.querySelectorAll('input[name="difficulty"]:checked')]
      .map(el => el.value);
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function clearError() {
    const el = document.getElementById('error-msg');
    el.classList.remove('visible');
  }

  function fmtTime(s) {
    s = Math.floor(s);
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  // ── Bell sound ─────────────────────────────────────────────────────────────
  function playBell() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      [[1318.51, 0.5, 4.0], [1318.51 * 2.756, 0.14, 1.8], [659.25, 0.18, 3.0]].forEach(([freq, vol, dur]) => {
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(vol, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + dur);
        osc.start(now); osc.stop(now + dur);
      });
    } catch(e) {}
  }

  // ── Timer ──────────────────────────────────────────────────────────────────
  function startTimer(seconds) {
    if (timerInterval) clearInterval(timerInterval);

    const block   = document.getElementById('timer-block');
    const display = document.getElementById('timer-display');
    const sublabel = block.querySelector('.timer-sublabel');

    block.classList.add('visible');
    display.style.color = '#1C1030';
    display.textContent = fmtTime(seconds);
    sublabel.textContent = 'Time remaining';

    let remaining = seconds;

    timerInterval = setInterval(() => {
      remaining--;

      if (remaining <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        display.textContent = "TIME'S UP!";
        display.style.color = '#C45C80';
        sublabel.textContent = 'Great job — reset and go again';
        playBell();
        return;
      }

      if (remaining <= 5)       display.style.color = '#C45C80';
      else if (remaining <= 10) display.style.color = '#E0A0B8';
      else                      display.style.color = '#1C1030';

      display.textContent = fmtTime(remaining);
    }, 1000);
  }

  // ── Audio controls ─────────────────────────────────────────────────────────
  function setupAudio(blobUrl, onEnded) {
    currentBlobUrl = blobUrl;
    audioEl.src = blobUrl;
    audioEl.muted = false;
    document.getElementById('icon-sound').style.display = '';
    document.getElementById('icon-muted').style.display = 'none';
    audioEl.onended = () => { if (onEnded) onEnded(); };
    audioEl.play().catch(() => {});
  }

  function toggleMute() {
    audioEl.muted = !audioEl.muted;
    document.getElementById('icon-sound').style.display = audioEl.muted ? 'none' : '';
    document.getElementById('icon-muted').style.display = audioEl.muted ? '' : 'none';
  }

  function replayAudio() {
    if (audioEl.src) {
      audioEl.currentTime = 0;
      audioEl.play().catch(() => {});
    }
  }

  // ── Generate ───────────────────────────────────────────────────────────────
  async function generateQuestion() {
    clearError();

    const topics = getSelectedTopics();
    const difficulties = getSelectedDifficulties();

    if (!topics.length || !difficulties.length) {
      showError('Select at least one topic and one difficulty level.');
      return;
    }

    // stop any running timer / audio
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    audioEl.pause();
    cardAudioIcons.classList.remove('visible');
    hiddenMsg.classList.remove('visible');
    document.getElementById('timer-block').classList.remove('visible');

    const btn = document.getElementById('btn-generate');
    btn.classList.add('loading');
    btn.textContent = 'Generating…';

    try {
      const res = await fetch('/question', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topics, difficulties, last: lastQuestion }),
      });

      const data = await res.json();
      if (!res.ok || data.error) {
        showError(data.error || 'Something went wrong.');
        return;
      }

      lastQuestion = data.question;
      document.getElementById('question-text').textContent = data.question;

      if (toggleShow.checked) {
        questionCard.classList.add('visible');
      } else {
        questionCard.classList.remove('visible');
      }

      updateHiddenMsg();

      const readAloud = toggleRead.checked;
      const timerOn   = toggleTimer.checked;
      const timerSecs = parseInt(timerSlider.value, 10);

      // Restore button now — question is shown, no need to keep it blocked
      btn.classList.remove('loading');
      btn.textContent = 'Generate Question';

      if (readAloud) {
        cardAudioIcons.classList.add('visible');

        // Fetch audio in background — button is already usable again
        try {
          const audioRes = await fetch('/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: data.question }),
          });

          if (!audioRes.ok) {
            if (timerOn) startTimer(timerSecs);
            return;
          }

          const blob    = await audioRes.blob();
          const blobUrl = URL.createObjectURL(blob);

          setupAudio(blobUrl, () => {
            if (timerOn) startTimer(timerSecs);
          });
        } catch {
          if (timerOn) startTimer(timerSecs);
        }

      } else {
        if (timerOn) startTimer(timerSecs);
      }

    } catch (err) {
      showError('Network error. Is the server running?');
      btn.classList.remove('loading');
      btn.textContent = 'Generate Question';
    }
  }

</script>
</body>
</html>
